<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: #f7faf8;
      color: #1f2937;
    }
    .container {
      width: min(100% - 32px, 900px);
      margin: 0 auto;
      padding: 40px 0;
    }
    .card {
      background: white;
      padding: 30px;
      border-radius: 18px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.08);
    }
    h1 {
      color: #2d6a4f;
    }
    .back {
      display: inline-block;
      margin-bottom: 20px;
      color: #2d6a4f;
      text-decoration: none;
      font-weight: bold;
    }
    input, textarea {
      width: 100%;
      padding: 12px;
      margin-top: 10px;
      margin-bottom: 12px;
      border: 1px solid #d1d5db;
      border-radius: 10px;
      box-sizing: border-box;
    }
    button {
      background: #f4845f;
      color: white;
      border: none;
      padding: 14px 18px;
      border-radius: 12px;
      font-weight: bold;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="container">
    <a class="back" href="index.html">← Retour à l’accueil</a>
    <div class="card">
      <h1>Contact</h1>
      <p>Page de contact simplifiée pour illustrer un point d’entrée utilisateur supplémentaire.</p>

      <form>
        <input type="text" placeholder="Votre nom" required>
        <input type="email" placeholder="Votre email" required>
        <textarea rows="5" placeholder="Votre message"></textarea>
        <button type="submit">Envoyer</button>
      </form>
    </div>
  </div>
</body>
</html>
